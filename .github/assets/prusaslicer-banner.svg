<svg width="1600" height="500" viewBox="0 0 1600 500" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="PrusaSlicer — the 3D-printing slicer in your browser">
  <defs>
    <linearGradient id="layers" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#0d9488"/>
      <stop offset="0.55" stop-color="#14b8a6"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1600" height="500" fill="#ffffff"/>

  <!-- Layered-frustum mark (teal on white), left panel -->
  <g transform="translate(250 250)">
    <g fill="url(#layers)">
      <rect x="-106" y="-100" width="212" height="26" rx="8"/>
      <rect x="-98"  y="-66"  width="196" height="26" rx="8"/>
      <rect x="-90"  y="-32"  width="180" height="26" rx="8"/>
      <rect x="-82"  y="2"    width="164" height="26" rx="8"/>
      <rect x="-74"  y="36"   width="148" height="26" rx="8"/>
      <rect x="-66"  y="70"   width="132" height="26" rx="8"/>
    </g>
    <rect x="-114" y="-134" width="228" height="26" rx="8" fill="#0d9488"/>
    <rect x="-138" y="116"  width="276" height="16" rx="8" fill="#cbd5e1"/>
  </g>

  <!-- Wordmark + claim -->
  <text x="470" y="238" font-family="'Segoe UI', 'DejaVu Sans', Arial, sans-serif" font-size="118" font-weight="800" fill="#161616" letter-spacing="-2">PrusaSlicer</text>
  <text x="474" y="312" font-family="'Segoe UI', 'DejaVu Sans', Arial, sans-serif" font-size="40" font-weight="500" fill="#475569">The 3D-printing slicer, in your browser.</text>
  <text x="474" y="366" font-family="'Segoe UI', 'DejaVu Sans', Arial, sans-serif" font-size="27" font-weight="500" fill="#0d9488" letter-spacing="0.5">Slice from any device · Selkies web desktop for Unraid · no client, no install</text>
</svg>
